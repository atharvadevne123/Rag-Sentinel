name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --select E,F,W,I --ignore E501

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          MODEL_PATH: /tmp/test_model.joblib
          METRICS_PATH: /tmp/test_metrics.json
        run: pytest tests/ -q --tb=short 2>&1 | tail -40
      - name: Upload coverage (optional)
        if: success()
        run: echo "Tests passed successfully"
